    <article><p><img alt="" src="../assets/wechatarticle-1447a9a45bff974bbf73bf04fdc1fd29-3731d987e1a180e35d9b73832aa855a2/b3ff7e7552e00474.jpg" /></p>
<p>首先，澄清一下，只要不用于“武器或者军事仿真目的”，大家都可以购买和使用RTDS仿真器，不受地缘政治的限制。尤其是我们造福社会，践行社会责任的电力系统稳定控制、电力电子、微网&amp;储能等应用类仿真和研究，丝毫不受地缘政治因素影响，可以正常采购和使用（包括中兴&amp;华为等）。</p>
