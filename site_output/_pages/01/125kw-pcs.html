    <article><p>1、仿真模型</p>
<p>进出风孔如下，环境温度按照45℃计算：</p>
<p><img alt="" src="https://mmbiz.qpic.cn/mmbiz_png/X8BXewQz1hQXvWamIzLfxm6e6ycAI8DFVc8h4ssLJkCAG99ms3tLvkI04TZdm8dEqEY8MeYnXdIaCw0w3zGOQw/640?wx_fmt=png&amp;from=appmsg" /></p>
<p>进出风孔如下，简化为流速-风阻曲线，如下图所示：</p>
<p><img alt="" src="https://mmbiz.qpic.cn/mmbiz_png/X8BXewQz1hQXvWamIzLfxm6e6ycAI8DFb6Xt2lbS1iagxYaMzbDwiaogMibbnR78y0o3RE2125NKGLB80ldaibvJNg/640?wx_fmt=png&amp;from=appmsg" /></p>
<p><img alt="" src="https://mmbiz.qpic.cn/mmbiz_png/X8BXewQz1hQXvWamIzLfxm6e6ycAI8DFQmwGQpkAsIs5cdgZcBlAnJ2pKibCJrspWW5zTVTRLV00831RP2uV6CQ/640?wx_fmt=png&amp;from=appmsg" /></p>
<p>风扇设为PQ曲线，如下图所示：</p>
<p><img alt="" src="https://mmbiz.qpic.cn/mmbiz_png/X8BXewQz1hQXvWamIzLfxm6e6ycAI8DFr9JiaKp9u1xoYqGGFBthYF1mBhBq4IUmyrvnANUBicw5txPYyzEQzgzw/640?wx_fmt=png&amp;from=appmsg" /></p>
<p>IGBT建模，如下图所示：</p>
<p><img alt="" src="https://mmbiz.qpic.cn/mmbiz_png/X8BXewQz1hQXvWamIzLfxm6e6ycAI8DFAovt3okRtFX8GJQ6lwmoicic0hliauyBrFYdC4OKnKW9FEAlanWHk2ia6A/640?wx_fmt=png&amp;from=appmsg" /></p>
<p>总热损耗6378W，对应PCS大概效率是97.03%。</p>
<p><img alt="" src="https://mmbiz.qpic.cn/mmbiz_png/X8BXewQz1hQXvWamIzLfxm6e6ycAI8DFlN2aAbXMCJC0WPhMtOwoQuVfxZf5xfE9UPaReVPXE0dsRP6syJ2dPA/640?wx_fmt=png&amp;from=appmsg" /></p>
<p>2、仿真结果</p>
